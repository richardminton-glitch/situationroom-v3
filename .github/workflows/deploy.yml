name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull and build
        run: |
          LOG=/tmp/sr-deploy.log
          exec > >(tee -a $LOG) 2>&1
          set -x
          echo "=== START $(date) ==="
          echo "whoami: $(whoami)"
          echo "PATH: $PATH"
          node --version || echo "node not found"
          npm --version || echo "npm not found"
          cd /opt/situationroom-v3 || { echo "cd FAILED"; exit 1; }
          git pull 2>&1 || { echo "git pull FAILED $?"; exit 1; }
          npm run build 2>&1
          sudo pm2 restart situationroom-v3
          echo "=== DONE ==="
