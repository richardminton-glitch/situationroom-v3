name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 147.93.61.102
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/situationroom-v3
            git pull
            npm run build
            pm2 restart situationroom-v3
