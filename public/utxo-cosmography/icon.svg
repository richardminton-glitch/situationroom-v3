<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Parchment background -->
  <rect width="512" height="512" fill="#f8f1e3"/>

  <!-- Outer guide ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#1a1a1a" stroke-width="7" opacity="0.18"/>

  <!-- Radial spokes (faint) -->
  <line x1="256" y1="256" x2="256" y2="58"  stroke="#1a1a1a" stroke-width="2" opacity="0.12" stroke-dasharray="10,8"/>
  <line x1="256" y1="256" x2="430" y2="163" stroke="#1a1a1a" stroke-width="2" opacity="0.12" stroke-dasharray="10,8"/>
  <line x1="256" y1="256" x2="420" y2="370" stroke="#1a1a1a" stroke-width="2" opacity="0.12" stroke-dasharray="10,8"/>
  <line x1="256" y1="256" x2="130" y2="420" stroke="#1a1a1a" stroke-width="2" opacity="0.12" stroke-dasharray="10,8"/>
  <line x1="256" y1="256" x2="75"  y2="190" stroke="#1a1a1a" stroke-width="2" opacity="0.12" stroke-dasharray="10,8"/>

  <!-- Constellation chain -->
  <polyline points="256,68 428,168 415,368 168,428 68,200 256,68"
            fill="none" stroke="#1a1a1a" stroke-width="3" opacity="0.32"
            stroke-dasharray="12,8"/>

  <!-- UTXO stars (outer ring) -->
  <!-- Ancient whale — large filled -->
  <circle cx="256" cy="68"  r="20" fill="#1a1a1a" opacity="0.85"/>
  <!-- Medium -->
  <circle cx="428" cy="168" r="12" fill="#2e2e2e" opacity="0.80"/>
  <!-- Large -->
  <circle cx="415" cy="368" r="16" fill="#1a1a1a" opacity="0.82"/>
  <!-- Small -->
  <circle cx="168" cy="428" r="9"  fill="#5a5a5a" opacity="0.72"/>
  <!-- Medium-small -->
  <circle cx="68"  cy="200" r="11" fill="#2e2e2e" opacity="0.78"/>

  <!-- Central star cluster (the current block UTXO cloud) -->
  <circle cx="256" cy="256" r="30" fill="#1a1a1a" opacity="0.90"/>
  <!-- Rays on the central body -->
  <line x1="256" y1="220" x2="256" y2="208" stroke="#1a1a1a" stroke-width="3" opacity="0.60"/>
  <line x1="256" y1="292" x2="256" y2="304" stroke="#1a1a1a" stroke-width="3" opacity="0.60"/>
  <line x1="220" y1="256" x2="208" y2="256" stroke="#1a1a1a" stroke-width="3" opacity="0.60"/>
  <line x1="292" y1="256" x2="304" y2="256" stroke="#1a1a1a" stroke-width="3" opacity="0.60"/>

  <!-- Inner cluster dust dots -->
  <circle cx="310" cy="230" r="6"  fill="#1a1a1a" opacity="0.65"/>
  <circle cx="200" cy="280" r="8"  fill="#2e2e2e" opacity="0.70"/>
  <circle cx="300" cy="310" r="5"  fill="#5a5a5a" opacity="0.60"/>
  <circle cx="220" cy="210" r="4"  fill="#5a5a5a" opacity="0.55"/>
  <circle cx="330" cy="295" r="7"  fill="#1a1a1a" opacity="0.68"/>
</svg>
